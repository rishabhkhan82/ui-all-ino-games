<div class="min-h-screen bg-gradient-to-br from-purple-900 via-blue-900 to-indigo-900 dark:from-gray-900 dark:via-gray-800 dark:to-black flex items-center justify-center p-4">
  <!-- Theme Toggle -->
  <div class="absolute top-4 right-4">
    <button
      (click)="themeService.toggleTheme()"
      class="p-2 rounded-full bg-white/10 hover:bg-white/20 transition-colors duration-200"
    >
      <svg *ngIf="!(themeService.isDarkMode$ | async)" class="w-6 h-6 text-yellow-400" fill="currentColor" viewBox="0 0 20 20">
        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
      </svg>
      <svg *ngIf="themeService.isDarkMode$ | async" class="w-6 h-6 text-yellow-400" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"></path>
      </svg>
    </button>
  </div>

  <!-- Login Card -->
  <div class="bg-white/10 backdrop-blur-lg rounded-2xl p-8 shadow-2xl w-full max-w-md border border-white/20">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-white mb-2">OWNER LOGIN</h1>
      <div class="w-16 h-1 bg-gradient-to-r from-yellow-400 to-orange-500 mx-auto rounded-full"></div>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-6">
      <!-- Username -->
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Username</label>
        <input
          type="text"
          [(ngModel)]="username"
          name="username"
          required
          class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:border-transparent transition-all duration-200"
          placeholder="Enter your username"
        >
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:border-transparent transition-all duration-200"
          placeholder="Enter your password"
        >
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="text-red-400 text-sm text-center bg-red-900/20 border border-red-500/30 rounded-lg p-3">
        {{ errorMessage }}
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="isLoading"
        class="w-full py-3 px-4 bg-gradient-to-r from-yellow-500 to-orange-600 hover:from-yellow-600 hover:to-orange-700 disabled:from-gray-500 disabled:to-gray-600 text-white font-bold rounded-lg shadow-lg transform hover:scale-105 disabled:hover:scale-100 disabled:cursor-not-allowed transition-all duration-200"
      >
        <span *ngIf="!isLoading">🔐 Login to Dashboard</span>
        <span *ngIf="isLoading" class="flex items-center justify-center">
          <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Logging in...
        </span>
      </button>
    </form>

    <!-- Back Link -->
    <div class="mt-6 text-center">
      <a
        routerLink="/"
        class="inline-block text-gray-300 hover:text-white transition-colors duration-200 underline"
      >
        ← Back to Home
      </a>
    </div>

    <!-- Decorative Element -->
    <div class="mt-8 flex justify-center">
      <h1 class="text-2xl font-bold text-white mb-4 tracking-wider drop-shadow-lg"> ALL INO <span class="text-2xl text-yellow-400 mt-2">WIN</span></h1>
    </div>
  </div>
</div>
