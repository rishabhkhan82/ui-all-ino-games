<div class="fixed top-4 right-4 z-50 space-y-2" style="min-width: 300px !important;">
  <div
    *ngFor="let notification of notifications"
    [ngClass]="getNotificationClasses(notification.type)"
    class="max-w-lg w-full shadow-lg rounded-lg pointer-events-auto ring-1 ring-black ring-opacity-5 p-4 transform transition-all duration-300 ease-in-out animate-slide-in-right"
  >
    <div class="flex items-start">
      <div class="flex-shrink-0">
        <!-- Icon based on type -->
        <svg *ngIf="notification.type === 'success'" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <svg *ngIf="notification.type === 'error'" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z" />
        </svg>
        <svg *ngIf="notification.type === 'warning'" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z" />
        </svg>
        <svg *ngIf="notification.type === 'info'" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <div class="ml-3 w-0 flex-1 pt-0.5">
        <p class="text-sm font-medium">
          {{ notification.message }}
        </p>
      </div>
      <div class="ml-4 flex-shrink-0 flex">
        <button
          (click)="removeNotification(notification.id)"
          class="inline-flex rounded-md p-1.5 focus:outline-none focus:ring-2 focus:ring-offset-2"
          [ngClass]="{
            'text-green-300 hover:bg-green-600 focus:ring-green-600': notification.type === 'success',
            'text-red-300 hover:bg-red-600 focus:ring-red-600': notification.type === 'error',
            'text-yellow-300 hover:bg-yellow-600 focus:ring-yellow-600': notification.type === 'warning',
            'text-blue-300 hover:bg-blue-600 focus:ring-blue-600': notification.type === 'info'
          }"
        >
          <span class="sr-only">Dismiss</span>
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
