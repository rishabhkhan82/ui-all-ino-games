<div class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50" *ngIf="isVisible">
  <div class="bg-white dark:bg-gray-800 rounded-lg shadow-2xl max-w-md mx-4 p-6 transform transition-all duration-300 scale-100">
    <div class="text-center">
      <div class="mb-4">
        <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-yellow-100 dark:bg-yellow-900">
          <svg class="h-6 w-6 text-yellow-600 dark:text-yellow-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z" />
          </svg>
        </div>
      </div>
      <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-2">{{ title }}</h3>
      <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">{{ message }}</p>
      <div class="flex space-x-3 justify-center">
        <button
          (click)="onCancel()"
          class="px-4 py-2 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors duration-200"
        >
          {{ cancelText || 'Cancel' }}
        </button>
        <button
          (click)="onConfirm()"
          class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors duration-200"
        >
          {{ confirmText || 'Confirm' }}
        </button>
      </div>
    </div>
  </div>
</div>
