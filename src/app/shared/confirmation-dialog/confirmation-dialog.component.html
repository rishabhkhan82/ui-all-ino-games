<div class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 backdrop-blur-sm" *ngIf="isVisible">
  <div class="bg-gradient-to-br from-white/15 to-white/5 backdrop-blur-lg rounded-2xl shadow-2xl max-w-md mx-4 p-8 border border-white/20 transform transition-all duration-300 scale-100">
    <div class="text-center">
      <div class="mb-6">
        <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-gradient-to-r from-yellow-400 to-orange-500 shadow-lg">
          <svg class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z" />
          </svg>
        </div>
      </div>
      <h3 class="text-2xl font-bold text-white mb-3 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">{{ title }}</h3>
      <p class="text-gray-300 mb-8 text-base">{{ message }}</p>
      <div class="flex space-x-4 justify-center">
        <button
          (click)="onCancel()"
          class="px-6 py-3 bg-gradient-to-r from-gray-500 to-gray-600 hover:from-gray-600 hover:to-gray-700 text-white font-bold rounded-lg shadow-lg transform hover:scale-105 transition-all duration-200"
        >
          {{ cancelText || 'Cancel' }}
        </button>
        <button
          (click)="onConfirm()"
          class="px-6 py-3 bg-gradient-to-r from-red-500 to-red-600 hover:from-red-600 hover:to-red-700 text-white font-bold rounded-lg shadow-lg transform hover:scale-105 transition-all duration-200"
        >
          {{ confirmText || 'Confirm' }}
        </button>
      </div>
    </div>
  </div>
</div>
